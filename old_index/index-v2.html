<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Agent 星际冒险</title>
<style>
  /* ===== 全局 ===== */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --space: #0a0e1a;
    --deep: #0d1b2a;
    --panel: #111827;
    --border: #1e3a5f;
    --cyan: #00e5ff;
    --purple: #a855f7;
    --yellow: #fbbf24;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  html, body { height: 100%; }
  body {
    background: var(--space);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  /* ===== 星空背景 ===== */
  #stars-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* ===== 屏幕管理 ===== */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .4s;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* ===== 通用卡片 ===== */
  .card {
    background: linear-gradient(135deg, #0d1b2a 0%, #111827 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 40px;
    box-shadow: 0 0 60px rgba(0,229,255,.08), 0 0 120px rgba(168,85,247,.06);
  }

  /* ===== 按钮 ===== */
  .btn {
    display: inline-block; cursor: pointer; border: none; border-radius: 12px;
    padding: 14px 28px; font-size: 1rem; font-weight: 700;
    transition: transform .15s, box-shadow .15s, filter .15s;
    user-select: none;
  }
  .btn:hover  { transform: translateY(-2px); filter: brightness(1.15); }
  .btn:active { transform: translateY(0);    filter: brightness(.9); }
  .btn-cyan   { background: linear-gradient(135deg, #0891b2, #00e5ff); color: #000; box-shadow: 0 0 20px rgba(0,229,255,.35); }
  .btn-purple { background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; box-shadow: 0 0 20px rgba(168,85,247,.35); }
  .btn-green  { background: linear-gradient(135deg, #15803d, #22c55e); color: #fff; box-shadow: 0 0 20px rgba(34,197,94,.35); }
  .btn-yellow { background: linear-gradient(135deg, #b45309, #fbbf24); color: #000; box-shadow: 0 0 20px rgba(251,191,36,.35); }
  .btn-red    { background: linear-gradient(135deg, #b91c1c, #ef4444); color: #fff; }
  .btn-ghost  { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }

  /* ===== TITLE SCREEN ===== */
  #screen-title .card { text-align: center; max-width: 580px; width: 90vw; }
  .title-ship { font-size: 5rem; animation: float 3s ease-in-out infinite; display: block; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  .title-h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 900;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin: 12px 0 6px;
  }
  .title-sub { color: var(--muted); font-size: .95rem; margin-bottom: 28px; }
  .title-badges { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px; }
  .badge {
    background: rgba(255,255,255,.06); border: 1px solid var(--border);
    border-radius: 99px; padding: 5px 14px; font-size: .8rem; color: var(--muted);
  }

  /* ===== MAP SCREEN ===== */
  #screen-map .inner {
    max-width: 760px; width: 92vw;
  }
  .map-header { text-align: center; margin-bottom: 28px; }
  .map-header h2 { font-size: 1.6rem; font-weight: 800; color: var(--cyan); }
  .map-header p  { color: var(--muted); font-size: .9rem; margin-top: 4px; }

  .planets-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }
  .planet-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 22px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
  }
  .planet-card::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(circle at 50% 0%, rgba(0,229,255,.06), transparent 70%);
    opacity:0; transition: opacity .3s;
  }
  .planet-card:hover::before { opacity: 1; }
  .planet-card:hover { border-color: var(--cyan); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,229,255,.12); }
  .planet-card.locked { opacity: .45; cursor: not-allowed; }
  .planet-card.locked:hover { transform: none; border-color: var(--border); box-shadow: none; }
  .planet-card.locked::before { display: none; }
  .planet-card.done { border-color: var(--green); }
  .planet-card.done::before { background: radial-gradient(circle at 50% 0%, rgba(34,197,94,.06), transparent 70%); opacity:1; }
  .planet-icon { font-size: 2.8rem; margin-bottom: 10px; display: block; }
  .planet-num  { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .planet-name { font-size: 1rem; font-weight: 700; margin: 4px 0 8px; }
  .planet-desc { font-size: .8rem; color: var(--muted); line-height: 1.5; }
  .planet-status {
    position: absolute; top: 12px; right: 12px;
    font-size: .72rem; font-weight: 700; padding: 3px 10px; border-radius: 99px;
  }
  .status-locked { background: rgba(100,116,139,.2); color: var(--muted); }
  .status-open   { background: rgba(0,229,255,.15); color: var(--cyan); }
  .status-done   { background: rgba(34,197,94,.15); color: var(--green); }

  /* Stars earned display */
  .hud {
    display: flex; align-items: center; gap: 16px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 99px; padding: 8px 20px; margin-bottom: 20px;
    width: fit-content; margin-left: auto;
  }
  .hud-item { font-size: .85rem; display: flex; align-items: center; gap: 6px; }
  .hud-item .val { font-weight: 700; color: var(--yellow); }

  /* ===== LEVEL SCREEN ===== */
  #screen-level {
    align-items: flex-start;
    overflow-y: auto;
    padding: 20px;
  }
  #screen-level .inner {
    max-width: 820px; width: 100%; margin: auto;
  }
  .level-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
  }
  .level-header .back-btn {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 14px; cursor: pointer; color: var(--muted); font-size: .85rem;
    transition: all .2s;
  }
  .level-header .back-btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .level-header h2 { font-size: 1.4rem; font-weight: 800; }
  .level-header .planet-emoji { font-size: 1.8rem; }

  /* Story box */
  .story-box {
    background: linear-gradient(135deg, #0d1b2a, #111827);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 24px; margin-bottom: 20px;
  }
  .story-box p { line-height: 1.8; font-size: .95rem; }
  .story-box .speaker {
    font-size: .75rem; color: var(--cyan); font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
  }
  .chat-bubble {
    background: rgba(0,229,255,.06); border-left: 3px solid var(--cyan);
    border-radius: 0 12px 12px 0; padding: 12px 16px; margin: 12px 0;
    font-size: .9rem; line-height: 1.7;
  }
  .chat-bubble.robot { border-color: var(--purple); background: rgba(168,85,247,.06); }

  /* Concept highlight */
  .concept-box {
    background: rgba(251,191,36,.06); border: 1px solid rgba(251,191,36,.25);
    border-radius: 14px; padding: 18px 20px; margin: 16px 0;
  }
  .concept-box .concept-title {
    font-size: .75rem; color: var(--yellow); font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px;
  }
  .concept-box p { font-size: .9rem; line-height: 1.7; }

  /* Code block */
  .code-block {
    background: #060d18; border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin: 16px 0; overflow-x: auto;
    font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: .85rem; line-height: 1.7;
  }
  .code-block .comment { color: #4a5568; }
  .code-block .keyword { color: #a855f7; }
  .code-block .string  { color: #22c55e; }
  .code-block .func    { color: #00e5ff; }
  .code-block .num     { color: #fbbf24; }

  /* Quiz */
  .quiz-box {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 24px; margin-top: 20px;
  }
  .quiz-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
  .quiz-question { font-size: .95rem; line-height: 1.7; margin-bottom: 18px; color: var(--text); }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt {
    background: rgba(255,255,255,.04); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px; cursor: pointer; font-size: .9rem;
    transition: all .2s; display: flex; align-items: center; gap: 10px;
  }
  .quiz-opt:hover { border-color: var(--cyan); background: rgba(0,229,255,.06); }
  .quiz-opt.correct { border-color: var(--green) !important; background: rgba(34,197,94,.1) !important; }
  .quiz-opt.wrong   { border-color: var(--red)   !important; background: rgba(239,68,68,.1)  !important; }
  .quiz-opt .opt-letter {
    width: 28px; height: 28px; border-radius: 8px; background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: .8rem; flex-shrink: 0;
  }
  .quiz-feedback {
    margin-top: 16px; padding: 14px 16px; border-radius: 12px;
    font-size: .9rem; line-height: 1.6; display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok  { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: var(--green); }
  .quiz-feedback.err { background: rgba(239,68,68,.1);  border: 1px solid rgba(239,68,68,.3);  color: #fca5a5; }

  /* Simulator */
  .sim-box {
    background: #060d18; border: 1px solid var(--border); border-radius: 16px;
    padding: 24px; margin: 20px 0;
  }
  .sim-title { font-size: .8rem; color: var(--cyan); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }
  .sim-terminal {
    background: #000; border-radius: 10px; padding: 16px;
    font-family: monospace; font-size: .85rem; min-height: 120px; margin-bottom: 14px;
    border: 1px solid #1a1a2e;
  }
  .sim-line { margin: 3px 0; }
  .sim-line.user-line  { color: var(--cyan); }
  .sim-line.agent-line { color: var(--purple); }
  .sim-line.tool-line  { color: var(--yellow); }
  .sim-line.result-line{ color: var(--green); }
  .sim-line.think-line { color: var(--muted); font-style: italic; }
  .sim-input-row { display: flex; gap: 10px; }
  .sim-input {
    flex: 1; background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: .9rem;
    outline: none;
  }
  .sim-input:focus { border-color: var(--cyan); }

  /* Progress bar */
  .progress-wrap { margin-top: 24px; }
  .progress-label { display: flex; justify-content: space-between; font-size: .8rem; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); border-radius: 99px; transition: width .5s ease; }

  /* Next btn */
  .level-nav { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; padding-bottom: 40px; }

  /* ===== WIN SCREEN ===== */
  #screen-win .card { text-align: center; max-width: 500px; width: 90vw; }
  .win-emoji { font-size: 5rem; animation: spin 2s linear infinite; display: block; }
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .win-title { font-size: 2rem; font-weight: 900; color: var(--yellow); margin: 16px 0 8px; }
  .win-sub { color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  .win-stars { font-size: 2.5rem; margin-bottom: 20px; }

  /* ===== DRAG GAME ===== */
  .drag-area {
    display: flex; gap: 16px; flex-wrap: wrap; margin: 16px 0;
  }
  .drag-items { display: flex; flex-wrap: wrap; gap: 10px; flex: 1; min-width: 200px; }
  .drag-slots { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 200px; }
  .drag-chip {
    background: rgba(168,85,247,.15); border: 1px solid rgba(168,85,247,.4);
    border-radius: 10px; padding: 10px 16px; cursor: grab; font-size: .85rem;
    user-select: none; transition: all .2s; color: var(--text);
  }
  .drag-chip:hover { transform: scale(1.04); border-color: var(--purple); }
  .drag-chip.dragging { opacity: .4; }
  .drop-slot {
    background: rgba(0,229,255,.04); border: 2px dashed rgba(0,229,255,.3);
    border-radius: 10px; padding: 12px 16px; min-height: 46px;
    font-size: .85rem; color: var(--muted); transition: all .2s;
    display: flex; align-items: center; gap: 8px;
  }
  .drop-slot.drag-over { border-color: var(--cyan); background: rgba(0,229,255,.1); }
  .drop-slot.filled { border-style: solid; border-color: var(--green); background: rgba(34,197,94,.08); color: var(--text); }
  .drop-slot .slot-label { font-size: .72rem; color: var(--muted); margin-right: 4px; }

  /* Pipe animation */
  .pipe-demo {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    background: #060d18; border-radius: 12px; padding: 16px; margin: 16px 0;
    font-size: .85rem;
  }
  .pipe-node {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; text-align: center; min-width: 90px;
    transition: all .4s; position: relative;
  }
  .pipe-node.active { border-color: var(--cyan); box-shadow: 0 0 16px rgba(0,229,255,.3); color: var(--cyan); }
  .pipe-node.done   { border-color: var(--green); color: var(--green); }
  .pipe-arrow { color: var(--muted); font-size: 1.2rem; }
  .pipe-node .node-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  .pipe-node .node-label{ font-size: .72rem; }

  /* Tooltip */
  [data-tip] { position: relative; cursor: help; border-bottom: 1px dashed var(--muted); }
  [data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #1e3a5f; color: var(--text); border-radius: 8px;
    padding: 6px 12px; font-size: .78rem; white-space: nowrap; z-index: 99;
    border: 1px solid var(--border); pointer-events: none;
  }

  /* Responsive */
  @media(max-width:600px){
    .card { padding: 24px 20px; }
    .planets-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<!-- ===== TITLE SCREEN ===== -->
<div id="screen-title" class="screen active">
  <div class="card">
    <span class="title-ship">🚀</span>
    <h1 class="title-h1">Agent 星际冒险</h1>
    <p class="title-sub">和你的 AI 机器人搭档一起，探索宇宙、学会编程！</p>
    <div class="title-badges">
      <span class="badge">🌍 8 颗星球</span>
      <span class="badge">⚡ Transformer</span>
      <span class="badge">🏋️ 预训练/微调</span>
      <span class="badge">🤖 Agent 开发</span>
      <span class="badge">⭐ 收集星星</span>
    </div>
    <button class="btn btn-cyan" style="width:100%;font-size:1.1rem;padding:16px" onclick="goMap()">
      🚀 开始冒险！
    </button>
    <p style="margin-top:14px;font-size:.8rem;color:var(--muted)">适合所有人 · 无需编程基础</p>
