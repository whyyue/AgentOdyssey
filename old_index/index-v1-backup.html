<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Agent 星际冒险</title>
<style>
  /* ===== 全局 ===== */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --space: #0a0e1a;
    --deep: #0d1b2a;
    --panel: #111827;
    --border: #1e3a5f;
    --cyan: #00e5ff;
    --purple: #a855f7;
    --yellow: #fbbf24;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  html, body { height: 100%; }
  body {
    background: var(--space);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  /* ===== 星空背景 ===== */
  #stars-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* ===== 屏幕管理 ===== */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .4s;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* ===== 通用卡片 ===== */
  .card {
    background: linear-gradient(135deg, #0d1b2a 0%, #111827 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 40px;
    box-shadow: 0 0 60px rgba(0,229,255,.08), 0 0 120px rgba(168,85,247,.06);
  }

  /* ===== 按钮 ===== */
  .btn {
    display: inline-block; cursor: pointer; border: none; border-radius: 12px;
    padding: 14px 28px; font-size: 1rem; font-weight: 700;
    transition: transform .15s, box-shadow .15s, filter .15s;
    user-select: none;
  }
  .btn:hover  { transform: translateY(-2px); filter: brightness(1.15); }
  .btn:active { transform: translateY(0);    filter: brightness(.9); }
  .btn-cyan   { background: linear-gradient(135deg, #0891b2, #00e5ff); color: #000; box-shadow: 0 0 20px rgba(0,229,255,.35); }
  .btn-purple { background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; box-shadow: 0 0 20px rgba(168,85,247,.35); }
  .btn-green  { background: linear-gradient(135deg, #15803d, #22c55e); color: #fff; box-shadow: 0 0 20px rgba(34,197,94,.35); }
  .btn-yellow { background: linear-gradient(135deg, #b45309, #fbbf24); color: #000; box-shadow: 0 0 20px rgba(251,191,36,.35); }
  .btn-red    { background: linear-gradient(135deg, #b91c1c, #ef4444); color: #fff; }
  .btn-ghost  { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }

  /* ===== TITLE SCREEN ===== */
  #screen-title .card { text-align: center; max-width: 580px; width: 90vw; }
  .title-ship { font-size: 5rem; animation: float 3s ease-in-out infinite; display: block; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  .title-h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 900;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin: 12px 0 6px;
  }
  .title-sub { color: var(--muted); font-size: .95rem; margin-bottom: 28px; }
  .title-badges { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px; }
  .badge {
    background: rgba(255,255,255,.06); border: 1px solid var(--border);
    border-radius: 99px; padding: 5px 14px; font-size: .8rem; color: var(--muted);
  }

  /* ===== MAP SCREEN ===== */
  #screen-map .inner {
    max-width: 760px; width: 92vw;
  }
  .map-header { text-align: center; margin-bottom: 28px; }
  .map-header h2 { font-size: 1.6rem; font-weight: 800; color: var(--cyan); }
  .map-header p  { color: var(--muted); font-size: .9rem; margin-top: 4px; }

  .planets-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }
  .planet-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 22px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
  }
  .planet-card::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(circle at 50% 0%, rgba(0,229,255,.06), transparent 70%);
    opacity:0; transition: opacity .3s;
  }
  .planet-card:hover::before { opacity: 1; }
  .planet-card:hover { border-color: var(--cyan); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,229,255,.12); }
  .planet-card.locked { opacity: .45; cursor: not-allowed; }
  .planet-card.locked:hover { transform: none; border-color: var(--border); box-shadow: none; }
  .planet-card.locked::before { display: none; }
  .planet-card.done { border-color: var(--green); }
  .planet-card.done::before { background: radial-gradient(circle at 50% 0%, rgba(34,197,94,.06), transparent 70%); opacity:1; }
  .planet-icon { font-size: 2.8rem; margin-bottom: 10px; display: block; }
  .planet-num  { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .planet-name { font-size: 1rem; font-weight: 700; margin: 4px 0 8px; }
  .planet-desc { font-size: .8rem; color: var(--muted); line-height: 1.5; }
  .planet-status {
    position: absolute; top: 12px; right: 12px;
    font-size: .72rem; font-weight: 700; padding: 3px 10px; border-radius: 99px;
  }
  .status-locked { background: rgba(100,116,139,.2); color: var(--muted); }
  .status-open   { background: rgba(0,229,255,.15); color: var(--cyan); }
  .status-done   { background: rgba(34,197,94,.15); color: var(--green); }

  /* Stars earned display */
  .hud {
    display: flex; align-items: center; gap: 16px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 99px; padding: 8px 20px; margin-bottom: 20px;
    width: fit-content; margin-left: auto;
  }
  .hud-item { font-size: .85rem; display: flex; align-items: center; gap: 6px; }
  .hud-item .val { font-weight: 700; color: var(--yellow); }

  /* ===== LEVEL SCREEN ===== */
  #screen-level {
    align-items: flex-start;
    overflow-y: auto;
    padding: 20px;
  }
  #screen-level .inner {
    max-width: 820px; width: 100%; margin: auto;
  }
  .level-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
  }
  .level-header .back-btn {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 14px; cursor: pointer; color: var(--muted); font-size: .85rem;
    transition: all .2s;
  }
  .level-header .back-btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .level-header h2 { font-size: 1.4rem; font-weight: 800; }
  .level-header .planet-emoji { font-size: 1.8rem; }

  /* Story box */
  .story-box {
    background: linear-gradient(135deg, #0d1b2a, #111827);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 24px; margin-bottom: 20px;
  }
  .story-box p { line-height: 1.8; font-size: .95rem; }
  .story-box .speaker {
    font-size: .75rem; color: var(--cyan); font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
  }
  .chat-bubble {
    background: rgba(0,229,255,.06); border-left: 3px solid var(--cyan);
    border-radius: 0 12px 12px 0; padding: 12px 16px; margin: 12px 0;
    font-size: .9rem; line-height: 1.7;
  }
  .chat-bubble.robot { border-color: var(--purple); background: rgba(168,85,247,.06); }

  /* Concept highlight */
  .concept-box {
    background: rgba(251,191,36,.06); border: 1px solid rgba(251,191,36,.25);
    border-radius: 14px; padding: 18px 20px; margin: 16px 0;
  }
  .concept-box .concept-title {
    font-size: .75rem; color: var(--yellow); font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px;
  }
  .concept-box p { font-size: .9rem; line-height: 1.7; }

  /* Code block */
  .code-block {
    background: #060d18; border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin: 16px 0; overflow-x: auto;
    font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: .85rem; line-height: 1.7;
  }
  .code-block .comment { color: #4a5568; }
  .code-block .keyword { color: #a855f7; }
  .code-block .string  { color: #22c55e; }
  .code-block .func    { color: #00e5ff; }
  .code-block .num     { color: #fbbf24; }

  /* Quiz */
  .quiz-box {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 24px; margin-top: 20px;
  }
  .quiz-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
  .quiz-question { font-size: .95rem; line-height: 1.7; margin-bottom: 18px; color: var(--text); }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt {
    background: rgba(255,255,255,.04); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px; cursor: pointer; font-size: .9rem;
    transition: all .2s; display: flex; align-items: center; gap: 10px;
  }
  .quiz-opt:hover { border-color: var(--cyan); background: rgba(0,229,255,.06); }
  .quiz-opt.correct { border-color: var(--green) !important; background: rgba(34,197,94,.1) !important; }
  .quiz-opt.wrong   { border-color: var(--red)   !important; background: rgba(239,68,68,.1)  !important; }
  .quiz-opt .opt-letter {
    width: 28px; height: 28px; border-radius: 8px; background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: .8rem; flex-shrink: 0;
  }
  .quiz-feedback {
    margin-top: 16px; padding: 14px 16px; border-radius: 12px;
    font-size: .9rem; line-height: 1.6; display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok  { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: var(--green); }
  .quiz-feedback.err { background: rgba(239,68,68,.1);  border: 1px solid rgba(239,68,68,.3);  color: #fca5a5; }

  /* Simulator */
  .sim-box {
    background: #060d18; border: 1px solid var(--border); border-radius: 16px;
    padding: 24px; margin: 20px 0;
  }
  .sim-title { font-size: .8rem; color: var(--cyan); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }
  .sim-terminal {
    background: #000; border-radius: 10px; padding: 16px;
    font-family: monospace; font-size: .85rem; min-height: 120px; margin-bottom: 14px;
    border: 1px solid #1a1a2e;
  }
  .sim-line { margin: 3px 0; }
  .sim-line.user-line  { color: var(--cyan); }
  .sim-line.agent-line { color: var(--purple); }
  .sim-line.tool-line  { color: var(--yellow); }
  .sim-line.result-line{ color: var(--green); }
  .sim-line.think-line { color: var(--muted); font-style: italic; }
  .sim-input-row { display: flex; gap: 10px; }
  .sim-input {
    flex: 1; background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: .9rem;
    outline: none;
  }
  .sim-input:focus { border-color: var(--cyan); }

  /* Progress bar */
  .progress-wrap { margin-top: 24px; }
  .progress-label { display: flex; justify-content: space-between; font-size: .8rem; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); border-radius: 99px; transition: width .5s ease; }

  /* Next btn */
  .level-nav { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; padding-bottom: 40px; }

  /* ===== WIN SCREEN ===== */
  #screen-win .card { text-align: center; max-width: 500px; width: 90vw; }
  .win-emoji { font-size: 5rem; animation: spin 2s linear infinite; display: block; }
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .win-title { font-size: 2rem; font-weight: 900; color: var(--yellow); margin: 16px 0 8px; }
  .win-sub { color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  .win-stars { font-size: 2.5rem; margin-bottom: 20px; }

  /* ===== DRAG GAME ===== */
  .drag-area {
    display: flex; gap: 16px; flex-wrap: wrap; margin: 16px 0;
  }
  .drag-items { display: flex; flex-wrap: wrap; gap: 10px; flex: 1; min-width: 200px; }
  .drag-slots { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 200px; }
  .drag-chip {
    background: rgba(168,85,247,.15); border: 1px solid rgba(168,85,247,.4);
    border-radius: 10px; padding: 10px 16px; cursor: grab; font-size: .85rem;
    user-select: none; transition: all .2s; color: var(--text);
  }
  .drag-chip:hover { transform: scale(1.04); border-color: var(--purple); }
  .drag-chip.dragging { opacity: .4; }
  .drop-slot {
    background: rgba(0,229,255,.04); border: 2px dashed rgba(0,229,255,.3);
    border-radius: 10px; padding: 12px 16px; min-height: 46px;
    font-size: .85rem; color: var(--muted); transition: all .2s;
    display: flex; align-items: center; gap: 8px;
  }
  .drop-slot.drag-over { border-color: var(--cyan); background: rgba(0,229,255,.1); }
  .drop-slot.filled { border-style: solid; border-color: var(--green); background: rgba(34,197,94,.08); color: var(--text); }
  .drop-slot .slot-label { font-size: .72rem; color: var(--muted); margin-right: 4px; }

  /* Pipe animation */
  .pipe-demo {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    background: #060d18; border-radius: 12px; padding: 16px; margin: 16px 0;
    font-size: .85rem;
  }
  .pipe-node {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; text-align: center; min-width: 90px;
    transition: all .4s; position: relative;
  }
  .pipe-node.active { border-color: var(--cyan); box-shadow: 0 0 16px rgba(0,229,255,.3); color: var(--cyan); }
  .pipe-node.done   { border-color: var(--green); color: var(--green); }
  .pipe-arrow { color: var(--muted); font-size: 1.2rem; }
  .pipe-node .node-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  .pipe-node .node-label{ font-size: .72rem; }

  /* Tooltip */
  [data-tip] { position: relative; cursor: help; border-bottom: 1px dashed var(--muted); }
  [data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #1e3a5f; color: var(--text); border-radius: 8px;
    padding: 6px 12px; font-size: .78rem; white-space: nowrap; z-index: 99;
    border: 1px solid var(--border); pointer-events: none;
  }

  /* Responsive */
  @media(max-width:600px){
    .card { padding: 24px 20px; }
    .planets-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<!-- ===== TITLE SCREEN ===== -->
<div id="screen-title" class="screen active">
  <div class="card">
    <span class="title-ship">🚀</span>
    <h1 class="title-h1">Agent 星际冒险</h1>
    <p class="title-sub">和你的 AI 机器人搭档一起，探索宇宙、学会编程！</p>
    <div class="title-badges">
      <span class="badge">🌍 8 颗星球</span>
      <span class="badge">⚡ Transformer</span>
      <span class="badge">🏋️ 预训练/微调</span>
      <span class="badge">🤖 Agent 开发</span>
      <span class="badge">⭐ 收集星星</span>
    </div>
    <button class="btn btn-cyan" style="width:100%;font-size:1.1rem;padding:16px" onclick="goMap()">
      🚀 开始冒险！
    </button>
    <p style="margin-top:14px;font-size:.8rem;color:var(--muted)">适合所有人 · 无需编程基础</p>
  </div>
</div>

<!-- ===== MAP SCREEN ===== -->
<div id="screen-map" class="screen">
  <div class="inner">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
      <div>
        <h2 style="font-size:1.5rem;font-weight:800;color:var(--cyan)">🌌 银河地图</h2>
        <p style="color:var(--muted);font-size:.85rem;margin-top:2px">选择一颗星球开始学习</p>
      </div>
      <div class="hud">
        <div class="hud-item">⭐ 星星 <span class="val" id="hud-stars">0</span></div>
        <div class="hud-item">🌍 星球 <span class="val" id="hud-planets">0/8</span></div>
      </div>
    </div>
    <div class="planets-grid" id="planets-grid"></div>
  </div>
</div>

<!-- ===== LEVEL SCREEN ===== -->
<div id="screen-level" class="screen">
  <div class="inner" id="level-inner"></div>
</div>

<!-- ===== WIN SCREEN ===== -->
<div id="screen-win" class="screen">
  <div class="card">
    <span class="win-emoji">🏆</span>
    <div class="win-title">太厉害了！</div>
    <div class="win-stars" id="win-stars">⭐⭐⭐⭐⭐</div>
    <p class="win-sub">
      你已经征服了所有星球！<br>
      从 Transformer 到预训练、后训练、微调，<br>
      再到 Agent、工具调用、ReAct、记忆、多 Agent……<br>
      你和爸爸都是 AI 宇宙顶级探险家了！🚀🏆
    </p>
    <button class="btn btn-cyan" style="width:100%" onclick="goMap()">再玩一次！</button>
  </div>
</div>

<script>
/* ============================================================
   STARS CANVAS
   ============================================================ */
(function(){
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  function init(){
    resize();
    stars = Array.from({length:180}, ()=>({
      x: Math.random()*c.width, y: Math.random()*c.height,
      r: Math.random()*1.5+.3, a: Math.random(), da: (Math.random()-.5)*.008
    }));
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a = Math.max(.1, Math.min(1, s.a+s.da));
      if(s.a<=.1||s.a>=1) s.da*=-1;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  init(); draw();
})();

/* ============================================================
   GAME STATE
   ============================================================ */
const state = {
  stars: 0,
  planets: {}, // id -> { done: bool, stars: int }
};

/* ============================================================
   PLANET DATA
   ============================================================ */
const PLANETS = [
  {
    id: 'p1', icon: '🌍', num: '星球 01', name: 'LLM 星', color: 'cyan',
    desc: '认识 AI 大脑！了解语言模型是什么。',
    status: 'open',
    sections: [
      {
        type: 'story',
        html: `
          <div class="speaker">🚀 船长日志 — 第1天</div>
          <p>你驾驶飞船来到了第一颗星球 —— <strong style="color:var(--cyan)">LLM 星</strong>。</p>
          <p style="margin-top:10px">你的副驾驶机器人 <strong>ARIA</strong> 跳了出来说：</p>
          <div class="chat-bubble robot">
            🤖 ARIA：船长！这颗星球住着一个超级大脑！它叫 <strong>LLM</strong>（Large Language Model，大语言模型）。
            它读过地球上几乎所有的书！所以你问它什么，它都能回答！
          </div>
          <p>你好奇地问道：</p>
          <div class="chat-bubble">
            👦 你：那它是怎么工作的？
          </div>
          <div class="chat-bubble robot">
            🤖 ARIA：很简单！你给它一段话，它就预测下一个词最可能是什么，
            然后再预测下下个词……就这样一个词一个词地接下去，就变成了一段完整的回答！
          </div>
        `
      },
      {
        type: 'concept',
        title: '💡 核心概念',
        html: `
          <p><strong style="color:var(--cyan)">LLM = 大语言模型</strong></p>
          <p style="margin-top:8px">它就像一个<span data-tip="读过几乎所有书的超级学生">超级读书机器</span>：</p>
          <ul style="margin:10px 0 0 16px;line-height:2">
            <li>📖 学过几乎所有人类写过的文字</li>
            <li>🔮 每次预测「下一个词」来生成回答</li>
            <li>💬 只能处理文字——不能自己上网、不能自己执行代码</li>
          </ul>

/* ============================================================
   SCREEN MANAGER
   ============================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function goMap() {
  renderMap();
  showScreen('map');
}

/* ============================================================
   MAP RENDER
   ============================================================ */
function renderMap() {
  document.getElementById('hud-stars').textContent = state.stars;
  const done = Object.values(state.planets).filter(p => p.done).length;
  document.getElementById('hud-planets').textContent = done + '/' + PLANETS.length;

  const grid = document.getElementById('planets-grid');
  grid.innerHTML = '';

  PLANETS.forEach((p, i) => {
    const unlocked = true; // 所有关卡都可以直接进入
    const done = state.planets[p.id]?.done;
    const statusText = done ? '已完成' : unlocked ? '可探索' : '未解锁';
    const statusClass = done ? 'status-done' : unlocked ? 'status-open' : 'status-locked';
    const cardClass = done ? 'done' : unlocked ? '' : 'locked';

    const card = document.createElement('div');
    card.className = 'planet-card ' + cardClass;
    card.innerHTML = `
      <span class="planet-status ${statusClass}">${statusText}</span>
      <span class="planet-icon">${p.icon}</span>
      <div class="planet-num">${p.num}</div>
      <div class="planet-name">${p.name}</div>
      <div class="planet-desc">${p.desc}</div>
    `;
    if (unlocked) card.onclick = () => openLevel(p.id);
    grid.appendChild(card);
  });
}

/* ============================================================
   LEVEL RENDER
   ============================================================ */
let currentPlanetId = null;
let currentSectionIdx = 0;
let quizAnswered = {}; // section idx -> bool
let dragState = {};

function openLevel(planetId) {
  currentPlanetId = planetId;
  currentSectionIdx = 0;
  quizAnswered = {};
  dragState = {};
  renderLevel();
  showScreen('level');
}

function renderLevel() {
  const planet = PLANETS.find(p => p.id === currentPlanetId);
  const totalSections = planet.sections.length;
  const progress = Math.round((currentSectionIdx / totalSections) * 100);

  let html = `
    <div class="level-header">
      <span class="back-btn" onclick="goMap()">← 地图</span>
      <span class="planet-emoji">${planet.icon}</span>
      <h2>${planet.name}</h2>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span>进度</span><span>${currentSectionIdx}/${totalSections}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
  `;

  if (currentSectionIdx >= totalSections) {
    html += renderCompletion(planet);
  } else {
    const section = planet.sections[currentSectionIdx];
    html += renderSection(section, currentSectionIdx);
    html += `<div class="level-nav">`;
    if (currentSectionIdx > 0) {
      html += `<button class="btn btn-ghost" onclick="prevSection()">← 上一步</button>`;
    }
    if (section.type !== 'quiz') {
      html += `<button class="btn btn-cyan" onclick="nextSection()">继续 →</button>`;
    }
    if (section.type === 'drag') {
      html += `<button class="btn btn-green" onclick="checkDrag()">检查答案 ✓</button>`;
    }
    html += `</div>`;
  }

  document.getElementById('level-inner').innerHTML = html;
  initSectionInteractions(planet.sections[currentSectionIdx]);
}

function renderSection(section, idx) {
  switch(section.type) {
    case 'story':   return renderStory(section);
    case 'concept': return renderConcept(section);
    case 'pipe':    return renderPipe(section);
    case 'quiz':    return renderQuiz(section, idx);
    case 'drag':    return renderDrag(section);
    case 'code':    return renderCode(section);
    case 'sim':     return renderSim(section);
    default: return '';
  }
}

function renderStory(s) {
  return `<div class="story-box">${s.html}</div>`;
}

function renderConcept(s) {
  return `
    <div class="concept-box">
      <div class="concept-title">${s.title}</div>
      ${s.html}
    </div>
  `;
}

function renderPipe(s) {
  const nodes = s.nodes.map((n,i) => `
    <div class="pipe-node" id="pipe-node-${i}">
      <span class="node-icon">${n.icon}</span>
      <span class="node-label">${n.label}</span>
    </div>
    ${i < s.nodes.length-1 ? '<span class="pipe-arrow">→</span>' : ''}
  `).join('');
  return `
    <div class="concept-box">
      <div class="concept-title">${s.title}</div>
      <div class="pipe-demo">${nodes}</div>
      <div style="text-align:center;margin-top:8px">
        <button class="btn btn-purple" onclick="animatePipe(${s.nodes.length})">▶ 播放动画</button>
      </div>
    </div>
  `;
}

function renderCode(s) {
  const lines = s.lines.map(l => {
    const cls = l.t === 'comment' ? 'comment' : l.t === 'string' ? 'string' : l.t === 'keyword' ? 'keyword' : 'normal';
    return `<div class="sim-line ${cls === 'normal' ? '' : cls}">${escHtml(l.s)}</div>`;
  }).join('');
  return `
    <div class="concept-box">
      <div class="concept-title">${s.title}</div>
      <div class="code-block">${lines}</div>
    </div>
  `;
}

function renderQuiz(s, idx) {
  const opts = s.opts.map((o, i) => {
    const letter = ['A','B','C','D'][i];
    return `
      <div class="quiz-opt" id="quiz-opt-${i}" onclick="answerQuiz(${i}, ${s.ans}, '${escAttr(s.feedback_ok)}', '${escAttr(s.feedback_err)}', ${idx})">
        <span class="opt-letter">${letter}</span>
        <span>${o}</span>
      </div>
    `;
  }).join('');
  return `
    <div class="quiz-box">
      <h3>🎯 闯关测试</h3>
      <div class="quiz-question">${s.q}</div>
      <div class="quiz-options">${opts}</div>
      <div class="quiz-feedback" id="quiz-feedback-${idx}"></div>
    </div>
  `;
}

function renderDrag(s) {
  const items = s.items.map(item => `
    <div class="drag-chip" id="chip-${item.id}" draggable="true" data-id="${item.id}">${item.text}</div>
  `).join('');
  const slots = s.slots.map(slot => `
    <div class="drop-slot" id="slot-${slot.id}" data-slot="${slot.id}" data-ans="${slot.ans}">
      <span class="slot-label">${slot.label}</span>
      <span id="slot-content-${slot.id}"></span>
    </div>
  `).join('');
  return `
    <div class="concept-box">
      <div class="concept-title">${s.title}</div>
      <p style="font-size:.85rem;color:var(--muted);margin-bottom:14px">${s.subtitle}</p>
      <div class="drag-area">
        <div class="drag-items" id="drag-items">${items}</div>
        <div class="drag-slots">${slots}</div>
      </div>
      <div id="drag-result" style="margin-top:12px"></div>
    </div>
  `;
}

function renderSim(s) {
  return `
    <div class="sim-box">
      <div class="sim-title">${s.title}</div>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:12px">${s.subtitle}</p>
      <div class="sim-terminal" id="sim-terminal">
        <div class="sim-line" style="color:var(--muted)">// 等待开始...</div>
      </div>
      <div id="sim-btn-area">
        <button class="btn btn-purple" onclick="simStep(0)">${s.steps[0].btnText}</button>
      </div>
      <p id="sim-hint" style="font-size:.82rem;color:var(--muted);margin-top:8px">${s.steps[0].prompt}</p>
    </div>
  `;
}

function renderCompletion(planet) {
  const earned = state.planets[planet.id]?.stars || 3;
  const stars = '⭐'.repeat(earned);
  return `
    <div class="card" style="text-align:center;margin-top:20px">
      <div style="font-size:4rem;margin-bottom:12px">${planet.icon}</div>
      <div style="font-size:1.6rem;font-weight:900;color:var(--yellow);margin-bottom:8px">
        ${planet.name} 已征服！
      </div>
      <div style="font-size:2rem;margin-bottom:16px">${stars}</div>
      <p style="color:var(--muted);margin-bottom:24px;line-height:1.7">
        太棒了！你学会了这颗星球的所有知识！<br>继续探索下一颗星球吧！
      </p>
      <button class="btn btn-cyan" style="width:100%" onclick="goMap()">返回银河地图 →</button>
    </div>
  `;
}

/* ============================================================
   INTERACTIONS
   ============================================================ */
function initSectionInteractions(section) {
  if (!section) return;
  if (section.type === 'drag') initDrag(section);
  if (section.type === 'sim') {
    // Store steps globally for sim
    window._simSteps = section.steps;
    window._simStep = 0;
  }
}

// Pipe animation
function animatePipe(count) {
  let i = 0;
  // Reset all
  for(let j=0;j<count;j++){
    const n = document.getElementById('pipe-node-'+j);
    if(n){ n.classList.remove('active','done'); }
  }
  const interval = setInterval(() => {
    if(i > 0){
      const prev = document.getElementById('pipe-node-'+(i-1));
      if(prev){ prev.classList.remove('active'); prev.classList.add('done'); }
    }
    const cur = document.getElementById('pipe-node-'+i);
    if(cur){ cur.classList.add('active'); }
    i++;
    if(i >= count){ clearInterval(interval); }
  }, 600);
}

// Quiz
function answerQuiz(chosen, correct, feedbackOk, feedbackErr, idx) {
  if(quizAnswered[idx]) return;
  quizAnswered[idx] = true;

  document.querySelectorAll('.quiz-opt').forEach((el, i) => {
    el.onclick = null;
    if(i === correct) el.classList.add('correct');
    else if(i === chosen) el.classList.add('wrong');
  });

  const fb = document.getElementById('quiz-feedback-' + idx);
  if(chosen === correct) {
    fb.className = 'quiz-feedback show ok';
    fb.textContent = feedbackOk;
    // Add next button
    const nav = document.querySelector('.level-nav');
    if(nav) {
      nav.innerHTML = `
        <button class="btn btn-ghost" onclick="prevSection()">← 上一步</button>
        <button class="btn btn-cyan" onclick="nextSection()">继续 →</button>
      `;
    }
  } else {
    fb.className = 'quiz-feedback show err';
    fb.textContent = feedbackErr;
    setTimeout(() => {
      document.querySelectorAll('.quiz-opt').forEach(el => {
        el.classList.remove('wrong');
      });
      quizAnswered[idx] = false;
      document.querySelectorAll('.quiz-opt').forEach((el, i) => {
        el.onclick = () => answerQuiz(i, correct, feedbackOk, feedbackErr, idx);
      });
      fb.className = 'quiz-feedback';
    }, 2500);
  }
}

// Sim
window._simSteps = [];
window._simStep = 0;

function simStep(step) {
  const steps = window._simSteps;
  if(step >= steps.length) return;

  const terminal = document.getElementById('sim-terminal');
  const s = steps[step];

  // Append lines with delay
  s.lines.forEach((line, i) => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'sim-line ' + (
        line.t === 'user'   ? 'user-line'   :
        line.t === 'agent'  ? 'agent-line'  :
        line.t === 'tool'   ? 'tool-line'   :
        line.t === 'result' ? 'result-line' :
        'think-line'
      );
      div.textContent = line.s;
      terminal.appendChild(div);
      terminal.scrollTop = terminal.scrollHeight;

      // After last line of last step
      if(i === s.lines.length - 1) {
        const nextStep = step + 1;
        const btnArea = document.getElementById('sim-btn-area');
        const hint = document.getElementById('sim-hint');
        if(nextStep < steps.length) {
          btnArea.innerHTML = `<button class="btn btn-purple" onclick="simStep(${nextStep})">${steps[nextStep].btnText}</button>`;
          if(hint) hint.textContent = steps[nextStep].prompt;
        } else {
          btnArea.innerHTML = `<span style="color:var(--green);font-weight:700">✅ 任务完成！Agent 成功运行！</span>`;
          if(hint) hint.textContent = '你已经完整体验了一次 ReAct 循环！点击"继续"进入测试。';
          // Enable next
          const nav = document.querySelector('.level-nav');
          if(nav && !nav.querySelector('.btn-cyan')) {
            nav.innerHTML += `<button class="btn btn-cyan" onclick="nextSection()">继续 →</button>`;
          }
        }
      }
    }, i * 500);
  });
}

// Drag & Drop
function initDrag(section) {
  const chips = document.querySelectorAll('.drag-chip');
  const slots = document.querySelectorAll('.drop-slot');
  let dragging = null;

  chips.forEach(chip => {
    chip.addEventListener('dragstart', e => {
      dragging = chip;
      chip.classList.add('dragging');
      e.dataTransfer.setData('text/plain', chip.dataset.id);
    });
    chip.addEventListener('dragend', () => {
      chip.classList.remove('dragging');
    });
  });

  slots.forEach(slot => {
    slot.addEventListener('dragover', e => {
      e.preventDefault();
      slot.classList.add('drag-over');
    });
    slot.addEventListener('dragleave', () => {
      slot.classList.remove('drag-over');
    });
    slot.addEventListener('drop', e => {
      e.preventDefault();
      slot.classList.remove('drag-over');
      const chipId = e.dataTransfer.getData('text/plain');
      const chip = document.getElementById('chip-' + chipId);
      if(!chip) return;

      const content = document.getElementById('slot-content-' + slot.dataset.slot);
      // Remove from previous slot if any
      const prev = Object.entries(dragState).find(([s, c]) => c === chipId);
      if(prev) {
        dragState[prev[0]] = null;
        document.getElementById('slot-content-' + prev[0]).textContent = '';
        document.getElementById('slot-' + prev[0]).classList.remove('filled');
      }
      // Place
      dragState[slot.dataset.slot] = chipId;
      content.textContent = chip.textContent;
      slot.classList.add('filled');
      chip.style.opacity = '.3';
      chip.draggable = false;
    });
  });
}

function checkDrag() {
  const planet = PLANETS.find(p => p.id === currentPlanetId);
  const section = planet.sections[currentSectionIdx];
  let allCorrect = true;
  section.slots.forEach(slot => {
    const placed = dragState[slot.id];
    const slotEl = document.getElementById('slot-' + slot.id);
    if(placed === slot.ans) {
      slotEl.style.borderColor = 'var(--green)';
    } else {
      slotEl.style.borderColor = 'var(--red)';
      allCorrect = false;
    }
  });

  const result = document.getElementById('drag-result');
  if(allCorrect) {
    result.innerHTML = '<span style="color:var(--green);font-weight:700">🎉 全部正确！你完全理解工具匹配了！</span>';
    // show next
    const nav = document.querySelector('.level-nav');
    if(nav && !nav.querySelector('.btn-cyan')) {
      nav.innerHTML += `<button class="btn btn-cyan" onclick="nextSection()">继续 →</button>`;
    }
  } else {
    result.innerHTML = '<span style="color:var(--red)">有些不对哦，红色的重新想想～</span>';
    setTimeout(() => {
      section.slots.forEach(slot => {
        document.getElementById('slot-' + slot.id).style.borderColor = '';
      });
      result.innerHTML = '';
    }, 2000);
  }
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function nextSection() {
  const planet = PLANETS.find(p => p.id === currentPlanetId);
  currentSectionIdx++;
  if(currentSectionIdx >= planet.sections.length) {
    // Complete planet
    if(!state.planets[currentPlanetId]) state.planets[currentPlanetId] = {};
    state.planets[currentPlanetId].done = true;
    state.planets[currentPlanetId].stars = 3;
    state.stars += 3;

    // Check if all done
    const allDone = PLANETS.every(p => state.planets[p.id]?.done);
    if(allDone) {
      document.getElementById('win-stars').textContent = '⭐'.repeat(state.stars > 15 ? 15 : state.stars);
      showScreen('win');
      return;
    }
  }
  renderLevel();
  document.getElementById('screen-level').scrollTop = 0;
}

function prevSection() {
  if(currentSectionIdx > 0) {
    currentSectionIdx--;
    renderLevel();
    document.getElementById('screen-level').scrollTop = 0;
  }
}

/* ============================================================
   HELPERS
   ============================================================ */
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');
}
</script>
